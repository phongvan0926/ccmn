function makeIcon(name) {
  return function(props) {
    var cn = props.className || "";
    var s = props.size || 24;
    return React.createElement("svg", {
      xmlns: "http://www.w3.org/2000/svg", width: s, height: s,
      viewBox: "0 0 24 24", fill: "none", stroke: "currentColor",
      strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
      className: cn, dangerouslySetInnerHTML: {__html: ICON_SVG[name]}
    });
  };
}

// ===== STORAGE: Google Sheets Auto-Sync =====
var STORAGE_KEY = 'ccmn_pro_data';
var QUEUE_KEY = 'ccmn_sync_queue';

// URL Apps Script nhúng sẵn — không cần setup
var API_URL = 'https://script.google.com/macros/s/AKfycbwbfVJDtlHdvQ6WZVqs6E3fuq8u2H69NqyE5W7L028TKfTTzv18iAIEkOpS6PhPCjTQ/exec';

// --- localStorage ---
function loadData() {
  try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); }
  catch(e) { console.warn('[CCMN] Load error:', e); }
  return null;
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e) { console.warn('[CCMN] Save error:', e); }
}

// --- Offline Queue ---
function getQueue() {
  try { var q = localStorage.getItem(QUEUE_KEY); return q ? JSON.parse(q) : []; }
  catch(e) { return []; }
}
function saveQueue(queue) {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(queue)); } catch(e) {}
}
function clearQueue() { localStorage.removeItem(QUEUE_KEY); }

// --- Sync TO Google Sheets ---
// Dùng POST no-cors: resolve = request gửi thành công, reject = mất mạng
function syncToCloud(data, callback) {
  var payload = {
    rooms: data.rooms, transactions: data.transactions,
    bills: data.bills, settings: data.settings,
    savedAt: new Date().toISOString()
  };
  fetch(API_URL, {
    method: 'POST', headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload), mode: 'no-cors'
  }).then(function() {
    clearQueue();
    if (callback) callback(true, 'Đã sync Sheets');
  }).catch(function(err) {
    // Mất mạng → lưu vào queue
    saveQueue([{ data: payload, timestamp: new Date().toISOString() }]);
    if (callback) callback(false, 'Mất mạng — đã lưu hàng đợi');
  });
}

// --- Sync FROM Google Sheets ---
function syncFromCloud(callback) {
  fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.success && json.data) {
        callback(true, json.data, null);
      } else {
        callback(false, null, json.error || 'Sheet trống');
      }
    })
    .catch(function(err) { callback(false, null, 'Mất mạng'); });
}

// --- Flush Queue (khi có mạng lại) ---
function flushQueue(callback) {
  var queue = getQueue();
  if (queue.length === 0) { if (callback) callback(0); return; }
  fetch(API_URL, {
    method: 'POST', headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(queue[0].data), mode: 'no-cors'
  }).then(function() {
    clearQueue();
    if (callback) callback(queue.length);
  }).catch(function() {
    if (callback) callback(-1);
  });
}

// --- Auto-retry khi có mạng lại ---
var _flushListenerAdded = false;
function setupAutoRetry(onFlushed) {
  if (_flushListenerAdded) return;
  _flushListenerAdded = true;
  window.addEventListener('online', function() {
    console.log('[CCMN] Online — flushing queue...');
    flushQueue(function(r) {
      if (r > 0 && onFlushed) onFlushed(r);
    });
  });
}

// Helper: get effective price for a room (room override > default settings)
function getRoomPrice(room, settings) {
  var p = room.pricing || {};
  return {
    elecPrice: p.elecPrice != null ? p.elecPrice : settings.elecPrice,
    waterPrice: p.waterPrice != null ? p.waterPrice : settings.waterPrice,
    waterPerPerson: p.waterPerPerson != null ? p.waterPerPerson : settings.waterPerPerson,
    internet: p.internet != null ? p.internet : settings.internet,
    service: p.service != null ? p.service : settings.service,
  };
}

// Helper: contract status
function getContractStatus(room) {
  if (!room.contractEnd || room.status !== 'Đang thuê') return { status: 'none', label: '', color: '', daysLeft: 0 };
  var today = new Date();
  var end = new Date(room.contractEnd);
  var diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
  if (diff < 0) return { status: 'expired', label: 'Hết hạn', color: 'red', daysLeft: diff };
  if (diff <= 30) return { status: 'expiring', label: 'Sắp hết (' + diff + ' ngày)', color: 'amber', daysLeft: diff };
  if (diff <= 90) return { status: 'warning', label: 'Còn ' + diff + ' ngày', color: 'yellow', daysLeft: diff };
  return { status: 'active', label: 'Còn ' + diff + ' ngày', color: 'emerald', daysLeft: diff };
}

function formatVND(n) {
  if (n === undefined || n === null || isNaN(n)) return '0';
  return Math.round(Math.abs(n)).toLocaleString('vi-VN');
}

// ===== DYNAMIC CALCULATION ENGINE =====
function calcFinancials(transactions) {
  var byCat = {};
  var byMonth = {};
  var allMonths = [];

  transactions.forEach(function(t) {
    var cat = t.category || 'CHI_KHAC';
    if (!byCat[cat]) byCat[cat] = { income: 0, expense: 0, count: 0 };
    byCat[cat].income += t.income || 0;
    byCat[cat].expense += t.expense || 0;
    byCat[cat].count += 1;

    var m = (t.date || '').slice(0, 7);
    if (m && m.length === 7) {
      if (!byMonth[m]) {
        byMonth[m] = { month: m, byCat: {} };
        allMonths.push(m);
      }
      if (!byMonth[m].byCat[cat]) byMonth[m].byCat[cat] = { income: 0, expense: 0 };
      byMonth[m].byCat[cat].income += t.income || 0;
      byMonth[m].byCat[cat].expense += t.expense || 0;
    }
  });

  allMonths = Array.from(new Set(allMonths)).sort();

  function sumCats(catList, field) {
    var total = 0;
    catList.forEach(function(c) { if (byCat[c]) total += byCat[c][field]; });
    return total;
  }
  function sumCatsMonth(m, catList, field) {
    var total = 0;
    if (!byMonth[m]) return 0;
    catList.forEach(function(c) { if (byMonth[m].byCat[c]) total += byMonth[m].byCat[c][field]; });
    return total;
  }

  var revenue = sumCats(['THU_TIEN_NHA'], 'income');
  var cogs = sumCats(['CHI_THUE_NHA'], 'expense');
  var gross = revenue - cogs;
  var utilityExp = sumCats(['CHI_DIEN','CHI_NUOC','CHI_MANG'], 'expense');
  var opex = sumCats(['CHI_VE_SINH','CHI_SUA_CHUA','CHI_MOI_GIOI','CHI_SETUP','CHI_PHI_NH','CHI_KHAC'], 'expense');
  var financialInc = sumCats(['THU_LAI_NH'], 'income');
  var ebit = gross - utilityExp - opex;
  var netProfit = ebit + financialInc;
  var totalIncome = sumCats(INCOME_CATS, 'income');
  var totalExpense = sumCats(EXPENSE_CATS, 'expense');
  var accountBalance = totalIncome - totalExpense;

  // Monthly P&L
  var cumulative = 0;
  var monthlyPnL = allMonths.map(function(m) {
    var mRev = sumCatsMonth(m, ['THU_TIEN_NHA'], 'income');
    var mCogs = sumCatsMonth(m, ['CHI_THUE_NHA'], 'expense');
    var mUtil = sumCatsMonth(m, ['CHI_DIEN','CHI_NUOC','CHI_MANG'], 'expense');
    var mOpex = sumCatsMonth(m, ['CHI_VE_SINH','CHI_SUA_CHUA','CHI_MOI_GIOI','CHI_SETUP','CHI_PHI_NH','CHI_KHAC'], 'expense');
    var mFin = sumCatsMonth(m, ['THU_LAI_NH'], 'income');
    var mGross = mRev - mCogs;
    var mEbit = mGross - mUtil - mOpex;
    var mNet = mEbit + mFin;
    cumulative += mNet;
    return {
      month: m, revenue: mRev, cogs: mCogs, utility: mUtil, opex: mOpex,
      financial: mFin, gross: mGross, ebit: mEbit, net: mNet, cumulative: cumulative,
      thueNha: mCogs, dien: sumCatsMonth(m, ['CHI_DIEN'], 'expense'),
      nuoc: sumCatsMonth(m, ['CHI_NUOC'], 'expense'), mang: sumCatsMonth(m, ['CHI_MANG'], 'expense'),
    };
  });

  // Cycle analysis (by rent payment periods)
  var cycles = [];
  var currentCycle = null;
  monthlyPnL.forEach(function(m) {
    if (m.cogs > 0 || currentCycle === null) {
      if (currentCycle) cycles.push(currentCycle);
      currentCycle = { startMonth: m.month, months: [m], rentPaid: m.cogs };
    } else {
      currentCycle.months.push(m);
    }
  });
  if (currentCycle) cycles.push(currentCycle);

  cycles.forEach(function(c) {
    c.endMonth = c.months[c.months.length - 1].month;
    c.totalRev = c.months.reduce(function(s, x) { return s + x.revenue; }, 0);
    c.totalUtil = c.months.reduce(function(s, x) { return s + x.utility; }, 0);
    c.totalOpex = c.months.reduce(function(s, x) { return s + x.opex; }, 0);
    c.totalFin = c.months.reduce(function(s, x) { return s + x.financial; }, 0);
    c.gross = c.totalRev - c.rentPaid - c.totalUtil;
    c.net = c.gross - c.totalOpex + c.totalFin;
    c.margin = c.totalRev > 0 ? (c.net / c.totalRev * 100) : 0;
    c.isComplete = c.months.length >= 3;
    c.label = c.months.length === 1
      ? c.startMonth.replace('20', '').replace('-', '/')
      : c.startMonth.replace('20', '').replace('-', '/') + ' - ' + c.endMonth.replace('20', '').replace('-', '/');
  });

  // Loan tracking
  var loans = { nhat: { out: 0, in: 0, interest: 0 }, phong: { out: 0 }, khanh: { out: 0 } };
  transactions.forEach(function(t) {
    var d = (t.desc || '').toLowerCase();
    if (t.category === 'CHI_CHO_VAY') {
      if (d.indexOf('nhất') >= 0) loans.nhat.out += t.expense;
      else if (d.indexOf('phong') >= 0) loans.phong.out += t.expense;
      else if (d.indexOf('khánh') >= 0) loans.khanh.out += t.expense;
    }
    if (t.category === 'THU_HOAN_VAY' && d.indexOf('nhất') >= 0) {
      if (t.income === 40608000) { loans.nhat.in += 30000000; loans.nhat.interest += 10608000; }
      else { loans.nhat.in += t.income; }
    }
  });

  // Capital
  var vonGop = sumCats(['THU_VON_GOP'], 'income');
  var cocChu = sumCats(['CHI_COC_CHU'], 'expense');
  var cocKhach = sumCats(['THU_COC_KHACH'], 'income');
  var capex = sumCats(['CHI_SETUP'], 'expense');
  var totalInvested = vonGop + capex + cocChu;

  return {
    byCat: byCat, byMonth: byMonth, allMonths: allMonths,
    revenue: revenue, cogs: cogs, gross: gross, utilityExp: utilityExp, opex: opex,
    financialInc: financialInc, ebit: ebit, netProfit: netProfit,
    totalIncome: totalIncome, totalExpense: totalExpense, accountBalance: accountBalance,
    monthlyPnL: monthlyPnL, cycles: cycles, loans: loans,
    vonGop: vonGop, cocChu: cocChu, cocKhach: cocKhach, capex: capex, totalInvested: totalInvested,
  };
}

        saveData({rooms:data.rooms||rooms, transactions:data.transactions||transactions, bills:data.bills||bills, settings:data.settings||settings, savedAt:data.savedAt});
        setSyncState({status:'ok',msg:'✅ Đã đồng bộ Sheets'});
      } else {
        setSyncState({status:'warn',msg:'⚠ Offline — dùng cache'});
      }
      setTimeout(function(){setSyncState({status:'idle',msg:''})}, 3000);
    });
  }, []);

  // Auto-save: localStorage ngay + Sheets sau 2s
  var saveTimer = React.useRef(null);
  var _firstRender = React.useRef(true);
  React.useEffect(function() {
    // Skip first render (đã load từ Sheets rồi)
    if (_firstRender.current) { _firstRender.current = false; return; }
    var data = { rooms: rooms, transactions: transactions, bills: bills, settings: settings, savedAt: new Date().toISOString() };
    saveData(data);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function() {
      setSyncState({status:'saving',msg:'↑ Đang sync...'});
      syncToCloud(data, function(ok, msg) {
        setSyncState({status: ok ? 'ok' : 'warn', msg: ok ? '✅ Đã sync Sheets' : '⚠ ' + msg});
        setTimeout(function(){setSyncState({status:'idle',msg:''})}, 2000);
      });
    }, 2000);
  }, [rooms, transactions, bills, settings]);


  // Dynamic calculations from transactions
  var fin = React.useMemo(function() { return calcFinancials(transactions); }, [transactions]);

  var stats = React.useMemo(function() {
    var occupied = rooms.filter(function(r) { return r.status === 'Đang thuê'; });

      emptyRooms: rooms.length - occupied.length,
      totalPeople: rooms.reduce(function(s, r) { return s + r.people; }, 0),
      totalRent: occupied.reduce(function(s, r) { return s + r.rent; }, 0),

    };

  ];

  function addTransaction(t) {
    var newId = transactions.length > 0 ? Math.max.apply(null, transactions.map(function(x){return x.id})) + 1 : 1;
    t.id = newId;
    setTransactions(function(prev) { return [t].concat(prev); });
    setShowModal(null);
  }

  return (

              {syncState.status === 'idle' ? (
                <span className="text-xs text-slate-500 flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Sheets
                </span>
              ) : (
                <span className={"text-xs px-2 py-0.5 rounded-full " + 
                  (syncState.status === 'ok' ? 'bg-emerald-500/20 text-emerald-400' :
                   syncState.status === 'saving' || syncState.status === 'loading' ? 'bg-blue-500/20 text-blue-400' :
                   'bg-amber-500/20 text-amber-400')}>
                  {syncState.msg}
                </span>
              )}
            </div>
            <p className="text-xs text-slate-500">Quản lý CCMN</p>
          </div>
          {navItems.map(function(item) {

              <button key={item.id} onClick={function(){setActiveTab(item.id)}}
                className={"w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition-all " + (activeTab === item.id ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200')}>
                <item.icon className="w-5 h-5" />

          <div className="mt-auto pt-4 border-t border-slate-800">

            <div className={"px-2 text-lg font-bold font-mono " + (fin.accountBalance >= 0 ? 'text-emerald-400' : 'text-red-400')}>{formatVND(fin.accountBalance)}đ</div>
          </div>
        </div>

        <div className="flex-1 p-6 overflow-auto" style={{maxHeight:'100vh'}}>

          {activeTab === 'rooms' && <RoomsView rooms={rooms} setRooms={setRooms} settings={settings} setSelectedRoom={setSelectedRoom} setShowModal={setShowModal} />}
          {activeTab === 'bills' && <BillsView bills={bills} setBills={setBills} rooms={rooms} settings={settings} setSelBill={setSelBill} setShowModal={setShowModal} setPreviewBill={setPreviewBill} />}

function TransactionsView({ transactions, setTransactions, fin, searchTerm, setSearchTerm, filterMonth, setFilterMonth, setShowModal, setSelTxn }) {
  var _catFilter = React.useState('all'); var catFilter = _catFilter[0]; var setCatFilter = _catFilter[1];

  var months = fin.allMonths || [];
  var filtered = transactions.filter(function(t) {
    if (filterMonth !== 'all' && (t.date || '').slice(0, 7) !== filterMonth) return false;
    if (catFilter !== 'all' && t.category !== catFilter) return false;
    if (searchTerm) {
      var s = searchTerm.toLowerCase();
      return (t.desc || '').toLowerCase().indexOf(s) >= 0 || (t.room || '').toLowerCase().indexOf(s) >= 0 || (t.note || '').toLowerCase().indexOf(s) >= 0;
    }
    return true;
  });

  // Summary by category for filtered
  var catSummary = {};
  filtered.forEach(function(t) {
    var c = t.category;
    if (!catSummary[c]) catSummary[c] = { income: 0, expense: 0, count: 0 };
    catSummary[c].income += t.income || 0;
    catSummary[c].expense += t.expense || 0;
    catSummary[c].count += 1;
  });

  return (
    <div className="space-y-4">
      <div className="flex justify-between items-center">
        <h2 className="text-xl font-bold text-white">Nhật ký Thu Chi</h2>

      </div>

      <div className="flex gap-2 flex-wrap">
        <select value={filterMonth} onChange={function(e){setFilterMonth(e.target.value)}} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">

          <option value="all">Tất cả loại</option>
          {Object.keys(CATEGORIES).map(function(k){return <option key={k} value={k}>{CATEGORIES[k].label}</option>})}

        <div className="relative flex-1 min-w-48">

        </div>
      </div>

      <div className="grid grid-cols-3 gap-3">

        </div>
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">Chi</div>

        <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">Số GD</div>
          <div className="text-lg font-bold text-white">{filtered.length}</div>
        </div>
      </div>

      <div className="bg-slate-900/50 border border-slate-800 rounded-xl overflow-hidden">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-slate-700">
              <th className="text-left py-2 px-3 text-slate-400">Ngày</th>

              <th className="text-right py-2 px-3 text-red-400">Chi</th>

            </tr>
          </thead>
          <tbody>
            {filtered.slice(0, 50).map(function(t) {
              var catInfo = CATEGORIES[t.category] || { label: t.category, color: 'text-slate-400' };
              return (
                <tr key={t.id} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                  <td className="py-2 px-3 text-slate-400 text-xs whitespace-nowrap">{(t.date||'').slice(5)}</td>

        </table>
        {filtered.length > 50 && <div className="text-center py-2 text-xs text-slate-500">Hiển thị 50/{filtered.length} giao dịch</div>}

  );

function buildAIContext(fin, transactions, rooms, bills, stats, settings) {

  function extractGeminiText(data) {
    if (!data) return '[extractGeminiText] data is null/undefined';
    if (data.error) return 'API Error: ' + (data.error.message || JSON.stringify(data.error));

      return '[extractGeminiText] No candidates. Keys: ' + Object.keys(data).join(',');

    var c = data.candidates[0];

    var textParts = parts.filter(function(p) { return p.text !== undefined && p.text !== null && !p.thought; });
    if (textParts.length === 0) {

      textParts = parts.filter(function(p) { return p.text !== undefined && p.text !== null; });

              <label className="text-xs text-slate-400">Phòng</label>
              <select value={room} onChange={function(e){setRoom(e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1">
                <option value="Chung">Chung</option>
                {initialRooms.map(function(r){return <option key={r.id} value={r.id}>{r.id}</option>})}
              </select>
            </div>
          </div>
          <div>
            <label className="text-xs text-slate-400">Ghi chú</label>
            <input type="text" value={note} onChange={function(e){setNote(e.target.value)}} placeholder="(tùy chọn)" className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" />
          </div>
        </div>

        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2 rounded-lg text-sm bg-slate-800 text-slate-400 hover:bg-slate-700">Hủy</button>
          <button onClick={handleSave} className={"flex-1 py-2 rounded-lg text-sm font-medium text-white " + (txnType === 'income' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-red-500 hover:bg-red-600')}>Lưu giao dịch</button>
        </div>
      </div>
    </div>
  );
}

// ===== EDIT ROOM MODAL =====
function EditRoomModal({ room, onSave, onClose }) {
  var _tab = React.useState('info'); var tab = _tab[0]; var setTab = _tab[1];
  var _f = React.useState(Object.assign({}, room, {
    pricing: Object.assign({elecPrice:null,waterPrice:null,waterPerPerson:null,internet:null,service:null}, room.pricing || {})
  }));
  var f = _f[0]; var setF = _f[1];

  function upd(key, val) { setF(Object.assign({}, f, (function(){var o={};o[key]=val;return o})())); }
  function updPricing(key, val) {
    var p = Object.assign({}, f.pricing);
    p[key] = val === '' || val === null ? null : Number(val);
    setF(Object.assign({}, f, {pricing: p}));
  }

  function handleSave() {
    onSave(Object.assign({}, f, { people: Number(f.people), rent: Number(f.rent), deposit: Number(f.deposit), contractMonths: Number(f.contractMonths || 0) }));
  }

  var tabs = [
    {id:'info', label:'Khách thuê', icon: Users},
    {id:'contract', label:'Hợp đồng', icon: FileText},
    {id:'pricing', label:'Giá riêng', icon: Zap},
  ];

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col" onClick={function(e){e.stopPropagation()}}>
        <div className="flex justify-between items-center p-5 pb-0">
          <h3 className="text-lg font-semibold text-white">Phòng {room.id}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-white"><X className="w-5 h-5" /></button>
        </div>

        <div className="flex gap-1 px-5 pt-3 border-b border-slate-800">
          {tabs.map(function(t) {
            var Icon = t.icon;
            return <button key={t.id} onClick={function(){setTab(t.id)}} className={"flex items-center gap-1.5 px-3 py-2 text-xs font-medium border-b-2 transition-all " + (tab === t.id ? 'border-emerald-400 text-emerald-400' : 'border-transparent text-slate-400 hover:text-white')}><Icon className="w-3.5 h-3.5" /> {t.label}</button>;
          })}
        </div>

        <div className="p-5 overflow-y-auto flex-1 space-y-3">
          {tab === 'info' && (
            <div className="space-y-3">
              <div><label className="text-xs text-slate-400">Trạng thái</label><select value={f.status} onChange={function(e){upd('status',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1"><option>Đang thuê</option><option>Trống</option></select></div>
              <div><label className="text-xs text-slate-400">Tên khách thuê</label><input type="text" value={f.tenant} onChange={function(e){upd('tenant',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs text-slate-400">Số điện thoại</label><input type="tel" value={f.phone||''} onChange={function(e){upd('phone',e.target.value)}} placeholder="0901234567" className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
                <div><label className="text-xs text-slate-400">Số CCCD</label><input type="text" value={f.cccd||''} onChange={function(e){upd('cccd',e.target.value)}} placeholder="012345678901" className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs text-slate-400">Số người ở</label><input type="number" value={f.people} onChange={function(e){upd('people',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
                <div><label className="text-xs text-slate-400">Cách tính nước</label><select value={f.waterType} onChange={function(e){upd('waterType',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1"><option value="person">Khoán/người</option><option value="meter">Đồng hồ</option></select></div>
              </div>
              <div><label className="text-xs text-slate-400">Ngày chuyển vào</label><input type="date" value={f.moveInDate||''} onChange={function(e){upd('moveInDate',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
              <div><label className="text-xs text-slate-400">Ghi chú</label><textarea value={f.note||''} onChange={function(e){upd('note',e.target.value)}} rows={2} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1 resize-none" /></div>
            </div>
          )}

          {tab === 'contract' && (
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs text-slate-400">Tiền phòng (đ/tháng)</label><input type="number" value={f.rent} onChange={function(e){upd('rent',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
                <div><label className="text-xs text-slate-400">Tiền cọc</label><input type="number" value={f.deposit} onChange={function(e){upd('deposit',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div><label className="text-xs text-slate-400">Ngày bắt đầu</label><input type="date" value={f.contractStart||''} onChange={function(e){upd('contractStart',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
                <div><label className="text-xs text-slate-400">Ngày kết thúc</label><input type="date" value={f.contractEnd||''} onChange={function(e){upd('contractEnd',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
                <div><label className="text-xs text-slate-400">Số tháng</label><input type="number" value={f.contractMonths||''} onChange={function(e){upd('contractMonths',e.target.value)}} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mt-1" /></div>
              </div>
              {f.contractEnd && (function() {
                var cs = getContractStatus(f);
                if (cs.status === 'none') return null;
                return (
                  <div className={"rounded-lg p-3 text-sm text-center font-medium " +
                    (cs.color === 'red' ? 'bg-red-500/15 text-red-400' :
                     cs.color === 'amber' ? 'bg-amber-500/15 text-amber-400' :
                     cs.color === 'yellow' ? 'bg-yellow-500/10 text-yellow-400' :
                     'bg-emerald-500/10 text-emerald-400')}>
                    {cs.status === 'expired' ? '⚠ HĐ đã hết hạn!' : '✓ ' + cs.label}
                  </div>
                );
              })()}
              <div className="bg-slate-800/30 rounded-lg p-3 text-xs text-slate-400 space-y-1">
                <div className="text-slate-300 font-medium">Lưu ý hợp đồng:</div>
                <div>• Cập nhật ngày kết thúc khi gia hạn hợp đồng</div>
                <div>• Hệ thống sẽ cảnh báo khi HĐ còn 30 ngày</div>
                <div>• HĐ hết hạn sẽ hiển thị cảnh báo đỏ trên Dashboard</div>
              </div>
            </div>
          )}

          {tab === 'pricing' && (
            <div className="space-y-3">
              <div className="bg-amber-500/5 border border-amber-500/20 rounded-lg p-3 text-xs text-amber-300">
                Để trống = dùng giá mặc định từ Cài đặt. Nhập số = áp dụng giá riêng cho phòng này.
              </div>
              {[
                {key:'elecPrice', label:'Giá điện', unit:'đ/kWh', def: 4000},
                {key:'waterPrice', label:'Giá nước (đồng hồ)', unit:'đ/m³', def: 35000},
                {key:'waterPerPerson', label:'Giá nước (khoán)', unit:'đ/người/tháng', def: 120000},
                {key:'internet', label:'Internet', unit:'đ/tháng', def: 100000},
                {key:'service', label:'Phí dịch vụ', unit:'đ/người/tháng', def: 150000},
              ].map(function(item) {
                var hasVal = f.pricing[item.key] != null;
                return (
                  <div key={item.key} className={"rounded-lg p-3 " + (hasVal ? 'bg-amber-500/5 border border-amber-500/20' : 'bg-slate-800/30 border border-slate-700')}>
                    <div className="flex justify-between items-center mb-1">
                      <label className={"text-xs " + (hasVal ? 'text-amber-400 font-medium' : 'text-slate-400')}>{item.label} <span className="text-slate-500">({item.unit})</span></label>
                      {hasVal && <button onClick={function(){updPricing(item.key, null)}} className="text-xs text-slate-500 hover:text-red-400">Xóa ✕</button>}
                    </div>
                    <div className="flex items-center gap-2">
                      <input type="number" value={f.pricing[item.key] != null ? f.pricing[item.key] : ''} onChange={function(e){updPricing(item.key, e.target.value)}} placeholder={"Mặc định: " + formatVND(item.def)} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div className="flex gap-2 p-5 pt-0">
          <button onClick={onClose} className="flex-1 py-2 rounded-lg text-sm bg-slate-800 text-slate-400">Hủy</button>
          <button onClick={handleSave} className="flex-1 py-2 rounded-lg text-sm bg-emerald-500 text-white font-medium hover:bg-emerald-600 flex items-center justify-center gap-2"><Save className="w-4 h-4" /> Lưu thay đổi</button>
        </div>
      </div>
    </div>
  );
}

// ===== RENDER =====
ReactDOM.render(React.createElement(CCMNApp), document.getElementById('root'));
</script>
</body>
</html>
